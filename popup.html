<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Password Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h2>🔐 Secure Password Generator</h2>

<div id="password" style="cursor: pointer;" title="Click to copy">Password will appear here</div>
<div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>

<label>Password Length:</label>
<input type="number" id="length" value="16" min="8" max="128">

<div class="options" style="margin: 5px 0 5px 0;">
    <label><input type="checkbox" id="lower" checked> Lowercase Characters (a-z)</label>
    <label><input type="checkbox" id="upper" checked> Uppercase Characters (A-Z)</label>
    <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
    <label><input type="checkbox" id="symbols" checked> Symbols (!@#$...)</label>
    <label><input type="checkbox" id="exclude-similar"> Exclude Similar Characters (o,0,i,l,1)</label>
    <label><input type="checkbox" id="exclude-ambiguous"> Exclude Ambiguous Characters</label>
</div>

<button id="generate">Generate New Password</button>

<!-- Personal Signature -->
<div style="text-align: center; margin-top: 8px; font-size: 0.78rem; color: #64748b;">
    Made with ❤️ by
    <a href="https://github.com/AbolfazlTafakori" target="_blank" style="color: #6366f1; text-decoration: none;">
        ABOLFAZL
    </a>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
